        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1f; color: #e0e0e0; margin: 0; padding: 20px; }

        .comparison-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); background: #25252d; }

        const history = [{"timestamp": "17-05-2026T12-24-57", "hash": "b4475618bf558f36c20ae3288e76b10d", "power": "4146", "squad": {"general": {"defId": "frosty", "equipables": {"1966": {"id": "heal_foot", "itemType": "Equipment", "level": "5", "sharpening": {"1": "e_crit_sharpening"}, "stateId": 1966}, "2044": {"id": "radiation_tracker", "itemType": "Equipment", "level": "30", "sharpening": {"1": "e_crit_sharpening", "30": "e_health_sharpening"}, "stateId": 2044}, "2130": {"id": "radiation_armor", "itemType": "Equipment", "level": "30", "sharpening": {"1": "e_reload_sharpening", "30": "e_dodge_sharpening"}, "stateId": 2130}, "3675": {"id": "radiation_ammunition", "itemType": "Equipment", "level": "10", "sharpening": {"1": "e_dodge_sharpening"}, "stateId": 3675}, "3792": {"id": "heal_engine", "itemType": "Equipment", "level": "10", "sharpening": {"1": "e_reload_sharpening"}, "stateId": 3792}, "3854": {"id": "radiation_weapon", "itemType": "Equipment", "level": "10", "sharpening": {"1": "e_reload_sharpening"}, "stateId": 3854}}, "isTrial": false, "level": "476", "stateId": 2982}, "units": [{"defId": "rust", "equipables": {"2346": {"id": "red_bull_weapon", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_dodge_sharpening", "120": "e_crit_sharpening", "30": "e_dodge_sharpening", "60": "e_damage_sharpening", "90": "e_reload_sharpening"}, "stateId": 2346}, "2505": {"id": "red_bull_foot", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_damage_sharpening", "120": "e_reload_sharpening", "30": "e_crit_sharpening", "60": "e_damage_sharpening", "90": "e_damage_sharpening"}, "stateId": 2505}, "2816": {"id": "red_bull_tracker", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_crit_sharpening", "120": "e_dodge_sharpening", "30": "e_damage_sharpening", "60": "e_dodge_sharpening", "90": "e_reload_sharpening"}, "stateId": 2816}, "3061": {"id": "red_bull_engine", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_crit_sharpening", "120": "e_dod ng", "30": "e_health_sharpening", "60": "e_reload_sharpening", "90": "e_dodge_sharpening"}, "stateId": 4530}}, "isTrial": false, "level": "476", "stars": "14", "stateId": 2433, "unitType": "Ordinary"}, {"defId": "hive", "equipables": {"2718": {"id": "health_tracker_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_health_sharpening", "120": "e_reload_sharpening", "30": "e_reload_sharpening", "60": "e_health_sharpening", "90": "e_damage_sharpening"}, "stateId": 2718}, "2975": {"id": "health_engine_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_health_sharpening", "120": "e_damage_sharpening", "30": "e_crit_sharpening", "60": "e_dodge_sharpening", "90": "e_health_sharpening"}, "stateId": 2975}, "3605": {"id": "health_foot_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_crit_sharpening", "120": "e_health_sharpening", "30": "e_dodge_sharpening", "60": "e_damage_sharpening", "90": "e_health_sharpening"}, "stateId": 3605}, "3709": {"id": "health_armor_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_crit_sharpening", "120": "e_health_sharpening", "30": "e_damage_sharpening", "60": "e_health_sharpening", "90": "e_crit_sharpening"}, "stateId": 3709}, "3999": {"id": "health_ammunition_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_reload_sharpening", "120": "e_crit_sharpening", "30": "e_health_sharpening", "60": "e_health_sharpening", "90": "e_dodge_sharpening"}, "stateId": 3999}, "4660": {"id": "health_weapon_legendary", "itemType": "Gear", "level": "98", "sharpening": {"1": "e_health_sharpening", "30": "e_damage_sharpening", "60": "e_health_sharpening", "90": "e_crit_sharpening"}, "stateId": 4660}}, "isTrial": false, "level": "476", "stars": "15", "stateId": 2305, "unitType": "Ordinary"}, {"defId": "armageddon", "equipables": {"2507": {"id": "watch_the_target_ammunition", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_reload_sharpening", "120": "e_damage_sharpening", "30": "e_dodge_sharpening", "60": "e_damage_sharpening", "90": "e_crit_sharpening"}, "stateId": 2507}, "2551": {"id": "watch_the_target_weapon", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_crit_sharpening", "120": "e_damage_sharpening", "30": "e_damage_sharpening", "60": "e_damage_sharpening", "90": "e_reload_sharpening"}, "stateId": 2551}, "3206": {"id": "criticals_armor_legendary", "itemType": "Gear", "level": "60", "sharpening": {"1": "e_crit_sharpening", "30": "e_health_sharpening", "60": "e_crit_sharpening"}, "stateId": 3206}, "3580": {"id": "watch_the_target_foot", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_crit_sharpening", "120": "e_crit_sharpening", "30": "e_reload_sharpening", "60": "e_crit_sharpening", "90": "e_reload_sharpening"}, "stateId": 3580}, "4344": {"id": "criticals_engine_legendary", "itemType": "Gear", "level": "34", "sharpening": {"1": "e_reload_sharpening", "30": "e_reload_sharpening"}, "stateId": 4344}, "4461": {"id": "criticals_tracker_legendary", "itemType": "Gear", "level": "81", "sharpening": {"1": "e_crit_sharpening", "30": "e_crit_sharpening", "60": "e_reload_sharpening"}, "stateId": 4461}}, "isTrial": false, "level": "476", "stars": "15", "stateId": 1096, "unitType": "Ordinary"}, {"defId": "rm23beam", "equipables": {"2568": {"id": "regen_foot_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_reload_sharpening", "120": "e_health_sharpening", "30": "e_damage_sharpening", "60": "e_health_sharpening", "90": "e_health_sharpening"}, "stateId": 2568}, "2589": {"id": "regen_weapon_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_reload_sharpening", "120": "e_dodge_sharpening", "30": "e_crit_sharpening", "60": "e_health_sharpening", "90": "e_damage_sharpening"}, "stateId": 2589}, "2845": {"id": "healing_power_tracker_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_health_sharpening", "120": "e_crit_sharpening", "30": "e_dodge_sharpening", "60": "e_health_sharpening", "90": "e_damage_sharpening"}, "stateId": 2845}, "2990": {"id": "healing_power_engine_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_reload_sharpening", "120": "e_crit_sharpening", "30": "e_crit_sharpening", "60": "e_damage_sharpening", "90": "e_health_sharpening"}, "stateId": 2990}, "3694": {"id": "healing_power_ammunition_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_health_sharpening", "120": "e_damage_sharpening", "30": "e_reload_sharpening", "60": "e_dodge_sharpening", "90": "e_reload_sharpening"}, "stateId": 3694}, "4271": {"id": "regen_armor_legendary", "itemType": "Gear", "level": "62", "sharpening": {"1": "e_health_sharpening", "30": "e_damage_sharpening", "60": "e_health_sharpening"}, "stateId": 4271}}, "isTrial": false, "level": "476", "stars": "15", "stateId": 1037, "unitType": "Ordinary"}]}}];
        const SLOT_ORDER = ['tracker', 'armor', 'weapon', 'engine', 'ammunition', 'foot'];

        // Populate selects
        const t1Select = document.getElementById('t1-select');
        const t2Select = document.getElementById('t2-select');

        history.forEach((entry, idx) => {
            const label = `${entry.timestamp} (Рейтинг: ${entry.power || 'N/A'})`;
            t1Select.add(new Option(label, idx));
            t2Select.add(new Option(label, idx));
        });

        // Default selection: T1 is first (oldest), T2 is last (newest)
        if (history.length > 0) {
            t1Select.selectedIndex = 0;
            t2Select.selectedIndex = history.length - 1;
        }

        function formatLevel(rawLvl) {
            try {
                let raw = parseInt(rawLvl);
                let lvl = Math.floor(raw / 4) + 1;
                let step = (raw % 4) + 1;
                return step === 1 ? lvl.toString() : `${lvl}.${step}`;
            } catch(e) { return rawLvl; }
        }

        function cleanStat(s) {
            if (!s) return "";
            if (s.startsWith('e_')) s = s.substring(2);
            return s.replace('_sharpening', '').replace('sharpening_', '').replace('sharpening', '');
        }

        function getModType(idStr) {
            if (!idStr) return "?";
            let parts = idStr.split('_');
            let res = [];
            for (let p of parts) {
                if (SLOT_ORDER.includes(p) || p === 'legendary') break;
                res.push(p);
            }
            return res.join('_');
        }

        function getSlotName(idStr) {
            for (let s of SLOT_ORDER) {
                if (idStr.includes(s)) return s;
            }
            return "other";
        }

        function aggregateUnit(uData) {
            if (!uData) return null;
            
            let defId = uData.defId || "Unknown";
            let level = uData.level || "?";
            let stars = uData.stars || "?";
            let equip = uData.equipables || {};
            
            let sharps = {};
            let mods = new Set();
            let slotLvls = {};
            
            for (let k in equip) {
                let eq = equip[k];
                let eqId = eq.id || "";
                let slot = getSlotName(eqId);
                let lvl = parseInt(eq.level || 0);
                slotLvls[slot] = lvl;
                mods.add(getModType(eqId));
                
                let eqSharps = eq.sharpening || {};
                for (let sk in eqSharps) {
                    let sVal = cleanStat(eqSharps[sk]);
                    sharps[sVal] = (sharps[sVal] || 0) + 1;
                }
            }
            
            let orderedLvls = [];
            for (let s of SLOT_ORDER) {
                if (slotLvls[s] !== undefined) {
                    orderedLvls.push(`${s}: ${slotLvls[s]}`);
                }
            }
            
            let eqStr = "";
            let values = Object.values(slotLvls);
            if (values.length === 6 && values.every(v => v === values[0])) {
                eqStr = values[0].toString();
            } else {
                eqStr = orderedLvls.join(", ");
            }
            
            return {
                defId,
                lvl: formatLevel(level),
                stars,
                mods: Array.from(mods).sort(),
                sharps,
                eqLvlsStr: eqStr,
                slotLvls
            };
        }

        function getDiffSummary(u1, u2) {
            if (!u1) return "Юнит добавлен.";
            if (!u2) return "Юнит убран.";
            
            let diffs = [];
            if (u1.lvl !== u2.lvl) diffs.push(`Ур: ${u1.lvl} → ${u2.lvl}`);
            if (u1.stars !== u2.stars) diffs.push(`★: ${u1.stars} → ${u2.stars}`);
            if (JSON.stringify(u1.slotLvls) !== JSON.stringify(u2.slotLvls)) {
                diffs.push(`Экип: ${u1.eqLvlsStr} → ${u2.eqLvlsStr}`);
            }
            
            let allKeys = new Set([...Object.keys(u1.sharps), ...Object.keys(u2.sharps)]);
            let sharpDiffs = [];
            for (let k of Array.from(allKeys).sort()) {
                let v1 = u1.sharps[k] || 0;
                let v2 = u2.sharps[k] || 0;
                if (v1 !== v2) {
                    sharpDiffs.push(`${k}: ${v1}→${v2}`);
                }
            }
            
            if (sharpDiffs.length > 0) {
                diffs.push("Заточки: " + sharpDiffs.join(", "));
            }
            
            return diffs.length > 0 ? diffs.join("; ") : "Без изменений.";
        }

        function renderUnitComparison(u1, u2, title) {
            if (!u1 && !u2) return "";
            
            let diffText = getDiffSummary(u1, u2);
            let isDiff = diffText !== "Без изменений.";
            
            let statusClass = isDiff ? "diff" : "same";
            let diffTag = isDiff ? '<span class="changes-tag">ИЗМЕНЕНО</span>' : '';
            
            function renderCell(u) {
                if (!u) return "<td>-</td>";
                let sharpsArr = [];
                for (let k in u.sharps) sharpsArr.push(`${k}: ${u.sharps[k]}`);
                let sharpsStr = sharpsArr.sort().join(", ");
                
                return `
                    <td class="${statusClass}">
                        <div class="unit-name">${u.defId} (Ур. ${u.lvl} | ${u.stars}★)</div>
                        <div style="margin-top:5px;">
                            <span class="label">Ур. Экипа:</span> <span class="val-sharps">${u.eqLvlsStr}</span><br>
                            <span class="label">Модули:</span> <span class="val-mods">${u.mods.join(", ")}</span><br>
                            <span class="label">Заточки:</span> <span class="val-sharps">${sharpsStr}</span>
                        </div>
                    </td>
                `;
            }

            return `
                <tr class="unit-row"><td colspan="2" class="row-header">${title} ${diffTag}</td></tr>
                ${isDiff ? `<tr><td colspan="2" class="diff-summary">${diffText}</td></tr>` : ''}
                <tr>${renderCell(u1)}${renderCell(u2)}</tr>
            `;
        }

        function compare() {
            const idx1 = t1Select.value;
            const idx2 = t2Select.value;
            
            const s1 = history[idx1].squad;
            const s2 = history[idx2].squad;
            
            const container = document.getElementById('comparison-container');
            
            let html = `
                <table class="comparison-table">
                    <tr>
                        <th>Ранее (${history[idx1].timestamp})</th>
                        <th>Сейчас (${history[idx2].timestamp})</th>
                    </tr>
            `;
            
            // Render General
            let g1 = aggregateUnit(s1.general);
            let g2 = aggregateUnit(s2.general);
            html += renderUnitComparison(g1, g2, "ГЕНЕРАЛ");
            
            // Render Units
            // Match by defId to see evolution
            let u1Map = {};
            if (s1.units) s1.units.forEach(u => { if (u.defId) u1Map[u.defId] = aggregateUnit(u); });
            
            let u2Map = {};
            if (s2.units) s2.units.forEach(u => { if (u.defId) u2Map[u.defId] = aggregateUnit(u); });
            
            let allDefIds = Array.from(new Set([...Object.keys(u1Map), ...Object.keys(u2Map)])).sort();
            
            allDefIds.forEach(defId => {
                html += renderUnitComparison(u1Map[defId], u2Map[defId], `ЮНИТ: ${defId.toUpperCase()}`);
            });
            
            html += "</table>";
            container.innerHTML = html;
        }

        // Initial run
        compare();
    </script>
