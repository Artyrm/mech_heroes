ype": "Gear", "level": "120", "sharpening": {"1": "e_health_sharpening", "120": "e_damage_sharpening", "30": "e_crit_sharpening", "60": "e_dodge_sharpening", "90": "e_dodge_sharpening"}, "stateId": 2753}, "2946": {"id": "dodge_ammunition_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_reload_sharpening", "120": "e_damage_sharpening", "30": "e_crit_sharpening", "60": "e_reload_sharpening", "90": "e_crit_sharpening"}, "stateId": 2946}}, "isTrial": false, "level": "476", "stars": "15", "stateId": 1055, "unitType": "Ordinary"}, {"defId": "armageddon", "equipables": {"1293": {"id": "watch_the_target_tracker", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_crit_sharpening", "120": "e_dodge_sharpening", "30": "e_crit_sharpening", "60": "e_crit_sharpening", "90": "e_health_sharpening"}, "stateId": 1293}, "1341": {"id": "watch_the_target_weapon", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_reload_sharpening", "120": "e_reload_sharpening", "30": "e_dodge_sharpening", "60": "e_health_sharpening", "90": "e_health_sharpening_medium"}, "stateId": 1341}, "1506": {"id": "watch_the_target_engine", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_health_sharpening", "120": "e_reload_sharpening", "30": "e_dodge_sharpening", "60": "e_crit_sharpening", "90": "e_dodge_sharpening"}, "stateId": 1506}, "2117": {"id": "criticals_ammunition_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_reload_sharpening", "120": "e_health_sharpening", "30": "e_crit_sharpening", "60": "e_crit_sharpening", "90": "e_health_sharpening"}, "stateId": 2117}, "2212": {"id": "criticals_foot_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_health_sharpening", "120": "e_health_sharpening", "30": "e_crit_sharpening", "60": "e_crit_sharpening", "90": "e_crit_sharpening"}, "stateId": 2212}, "2303": {"id": "criticals_armor_legendary", "itemType": "Gear", "level": "120", "sharpening": {"1": "e_health_sharpening", "120": "e_reload_sharpening", "30": "e_crit_sharpening", "60": "e_crit_sharpening", "90": "e_crit_sharpening"}, "stateId": 2303}}, "isTrial": false, "level": "476", "stars": "15", "stateId": 1050, "unitType": "Ordinary"}]}}];
        const SLOT_ORDER = ['tracker', 'armor', 'weapon', 'engine', 'ammunition', 'foot'];

        function formatDateMSK(s) {
            try {
                const [d, t] = s.split('T');
                const [year, month, day] = d.split('-');
                const [h, m, sec] = t.split('-');
                const date = new Date(Date.UTC(year, month - 1, day, h, m, sec));
                const msk = new Date(date.getTime() + 3 * 3600 * 1000);
                
                const dd = String(msk.getUTCDate()).padStart(2, '0');
                const mm = String(msk.getUTCMonth() + 1).padStart(2, '0');
                const yyyy = msk.getUTCFullYear();
                const hh = String(msk.getUTCHours()).padStart(2, '0');
                const mi = String(msk.getUTCMinutes()).padStart(2, '0');
                const ss = String(msk.getUTCSeconds()).padStart(2, '0');
                return `${dd}.${mm}.${yyyy} ${hh}:${mi}:${ss} МСК`;
            } catch(e) { return s; }
        }

        // Populate selects
        const t1Select = document.getElementById('t1-select');
        const t2Select = document.getElementById('t2-select');

        history.forEach((entry, idx) => {
            const label = `${formatDateMSK(entry.timestamp)} (Рейтинг: ${entry.power || 'N/A'})`;
            t1Select.add(new Option(label, idx));
            t2Select.add(new Option(label, idx));
        });

        // Default selection: T1 is first (oldest), T2 is last (newest)
        if (history.length > 0) {
            t1Select.selectedIndex = 0;
            t2Select.selectedIndex = history.length - 1;
        }

        function formatLevel(rawLvl) {
            try {
                let raw = parseInt(rawLvl);
                let lvl = Math.floor(raw / 4) + 1;
                let step = (raw % 4) + 1;
                return step === 1 ? lvl.toString() : `${lvl}.${step}`;
            } catch(e) { return rawLvl; }
        }

        function cleanStat(s) {
            if (!s) return "";
            if (s.startsWith('e_')) s = s.substring(2);
            return s.replace('_sharpening', '').replace('sharpening_', '').replace('sharpening', '');
        }

        function getModType(idStr) {
            if (!idStr) return "?";
            let parts = idStr.split('_');
            let res = [];
            for (let p of parts) {
                if (SLOT_ORDER.includes(p) || p === 'legendary') break;
                res.push(p);
            }
            return res.join('_');
        }

        function getSlotName(idStr) {
            for (let s of SLOT_ORDER) {
                if (idStr.includes(s)) return s;
            }
            return "other";
        }

        function aggregateUnit(uData) {
            if (!uData) return null;
            
            let defId = uData.defId || "Unknown";
            let level = uData.level || "?";
            let stars = uData.stars || "?";
            let equip = uData.equipables || {};
            
            let sharps = {};
            let mods = new Set();
            let slotLvls = {};
            
            for (let k in equip) {
                let eq = equip[k];
                let eqId = eq.id || "";
                let slot = getSlotName(eqId);
                let lvl = parseInt(eq.level || 0);
                slotLvls[slot] = lvl;
                mods.add(getModType(eqId));
                
                let eqSharps = eq.sharpening || {};
                for (let sk in eqSharps) {
                    let sVal = cleanStat(eqSharps[sk]);
                    sharps[sVal] = (sharps[sVal] || 0) + 1;
                }
            }
            
            let orderedLvls = [];
            for (let s of SLOT_ORDER) {
                if (slotLvls[s] !== undefined) {
                    orderedLvls.push(`${s}: ${slotLvls[s]}`);
                }
            }
            
            let eqStr = "";
            let values = Object.values(slotLvls);
            if (values.length === 6 && values.every(v => v === values[0])) {
                eqStr = values[0].toString();
            } else {
                eqStr = orderedLvls.join(", ");
            }
            
            return {
                defId,
                lvl: formatLevel(level),
                stars,
                mods: Array.from(mods).sort(),
                sharps,
                eqLvlsStr: eqStr,
                slotLvls
            };
        }

        function getDiffSummary(u1, u2) {
            if (!u1) return "Юнит добавлен.";
            if (!u2) return "Юнит убран.";
            
            let diffs = [];
            if (u1.lvl !== u2.lvl) diffs.push(`Ур: ${u1.lvl} → ${u2.lvl}`);
            if (u1.stars !== u2.stars) diffs.push(`★: ${u1.stars} → ${u2.stars}`);
            if (JSON.stringify(u1.slotLvls) !== JSON.stringify(u2.slotLvls)) {
                diffs.push(`Экип: ${u1.eqLvlsStr} → ${u2.eqLvlsStr}`);
            }
            
            let allKeys = new Set([...Object.keys(u1.sharps), ...Object.keys(u2.sharps)]);
            let sharpDiffs = [];
            for (let k of Array.from(allKeys).sort()) {
                let v1 = u1.sharps[k] || 0;
                let v2 = u2.sharps[k] || 0;
                if (v1 !== v2) {
                    sharpDiffs.push(`${k}: ${v1}→${v2}`);
                }
            }
            
            if (sharpDiffs.length > 0) {
                diffs.push("Заточки: " + sharpDiffs.join(", "));
            }
            
            return diffs.length > 0 ? diffs.join("; ") : "Без изменений.";
        }

        function renderUnitComparison(u1, u2, title) {
            if (!u1 && !u2) return "";
            
            let diffText = getDiffSummary(u1, u2);
            let isDiff = diffText !== "Без изменений.";
            
            let statusClass = isDiff ? "diff" : "same";
            let diffTag = isDiff ? '<span class="changes-tag">ИЗМЕНЕНО</span>' : '';
            
            function renderCell(u) {
                if (!u) return "<td>-</td>";
                let sharpsArr = [];
                for (let k in u.sharps) sharpsArr.push(`${k}: ${u.sharps[k]}`);
                let sharpsStr = sharpsArr.sort().join(", ");
                
                return `
                    <td class="${statusClass}">
                        <div class="unit-name">${u.defId} (Ур. ${u.lvl} | ${u.stars}★)</div>
                        <div style="margin-top:5px;">
                            <span class="label">Ур. Экипа:</span> <span class="val-sharps">${u.eqLvlsStr}</span><br>
                            <span class="label">Модули:</span> <span class="val-mods">${u.mods.join(", ")}</span><br>
                            <span class="label">Заточки:</span> <span class="val-sharps">${sharpsStr}</span>
                        </div>
                    </td>
                `;
            }

            return `
                <tr class="unit-row"><td colspan="2" class="row-header">${title} ${diffTag}</td></tr>
                ${isDiff ? `<tr><td colspan="2" class="diff-summary">${diffText}</td></tr>` : ''}
                <tr>${renderCell(u1)}${renderCell(u2)}</tr>
            `;
        }

        function compare() {
            const idx1 = t1Select.value;
            const idx2 = t2Select.value;
            
            const s1 = history[idx1].squad;
            const s2 = history[idx2].squad;
            
            const container = document.getElementById('comparison-container');
            
            let html = `
                <table class="comparison-table">
                    <tr>
                        <th>Ранее (${formatDateMSK(history[idx1].timestamp)})</th>
                        <th>Сейчас (${formatDateMSK(history[idx2].timestamp)})</th>
                    </tr>
            `;
            
            // Render General
            let g1 = aggregateUnit(s1.general);
            let g2 = aggregateUnit(s2.general);
            html += renderUnitComparison(g1, g2, "ГЕНЕРАЛ");
            
            // Render Units
            // Match by defId to see evolution
            let u1Map = {};
            if (s1.units) s1.units.forEach(u => { if (u.defId) u1Map[u.defId] = aggregateUnit(u); });
            
            let u2Map = {};
            if (s2.units) s2.units.forEach(u => { if (u.defId) u2Map[u.defId] = aggregateUnit(u); });
            
            let allDefIds = Array.from(new Set([...Object.keys(u1Map), ...Object.keys(u2Map)])).sort();
            
            allDefIds.forEach(defId => {
                html += renderUnitComparison(u1Map[defId], u2Map[defId], `ЮНИТ: ${defId.toUpperCase()}`);
            });
            
            html += "</table>";
            container.innerHTML = html;
        }

        // Initial run
        compare();
    </script>
