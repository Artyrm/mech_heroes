            const diff = oppR - ourR;
            let w = Math.max(1, 10 + Math.trunc(diff / 20));

            return {w: '+' + w, l: l};

        }
        function parseTS(ts) {

        }
        function formatDateMSK(ts) {
            const dt = parseTS(ts);

        }

        const latestDate = parseTS(dates[dates.length-1]);

        let t1Idx = 0;
